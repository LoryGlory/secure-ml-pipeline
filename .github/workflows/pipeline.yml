name: Secure ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-test:
    name: Security Scan, Tests & Train
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Security Gate 1: Bandit (static code security scan) ──────────────
      - name: Run Bandit security scan
        run: |
          bandit -r model/ -ll -ii \
            --format json \
            --output bandit-report.json \
            || bandit -r model/ -ll -ii
        # -ll = report medium+ severity; -ii = report medium+ confidence
        # Run twice: first to produce JSON, second to show human output if it fails

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # ── Security Gate 2: pip-audit (dependency vulnerability scan) ────────
      - name: Run pip-audit vulnerability scan
        run: pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || pip-audit --requirement requirements.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run pytest
        run: pytest tests/ -v --tb=short

      # ── Train & log to MLflow ─────────────────────────────────────────────
      - name: Train model and log to MLflow
        run: python model/train.py

      - name: Upload MLflow runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: spam-classifier
          path: model/spam_classifier.pkl

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: secure-ml-pipeline:${{ github.sha }},secure-ml-pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
